name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    name: Build, test, lint, format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize SparrowDB submodule (required)
        # Phase 1 integrates the vendored SparrowDB store: `kanbrick-store`
        # path-depends on `crates/sparrowdb`, so its contents ARE required to
        # build. Init it non-recursively (its internal crates live in the same
        # repo, so one init fetches them all). Fail the job if this fails.
        run: git submodule update --init --depth 1 crates/sparrowdb

      - name: Initialize remaining vendored submodules (best-effort)
        # ironclaw / tachyon-mesh / sparrowdb-ontology are integrated in later
        # phases and are excluded from the current build graph. SparrowOntology
        # ships a broken nested gitlink that breaks recursive checkout, so this
        # is non-recursive and must not fail CI.
        continue-on-error: true
        run: |
          git submodule update --init --depth 1 \
            crates/sparrowdb-ontology crates/ironclaw crates/tachyon-mesh \
            || echo "::warning::Some vendored submodules failed to init; they are excluded from the build graph."

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features
