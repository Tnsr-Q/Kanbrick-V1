name: Bug report
description: Report a reproducible defect for triage.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: "Briefly describe the failure."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Make this exact enough for an agent to attempt reproduction.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, stack traces, links, or failing test output.
      placeholder: "Paste logs or attach screenshots."
    validations:
      required: false
  - type: textarea
    id: suspected-area
    attributes:
      label: Suspected area
      description: Optional. Point to files, modules, routes, commands, or recent PRs.
      placeholder: |
        - `src/...`
        - Related PR: #
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] Bug is reproduced or explained as not reproducible.
        - [ ] Root cause is identified.
        - [ ] Fix is covered by regression test or equivalent verification.
    validations:
      required: true
