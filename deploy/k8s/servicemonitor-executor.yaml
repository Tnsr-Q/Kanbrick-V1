# Prometheus Operator ServiceMonitor for the Kanbrick-V1 executor pool (#71).
#
# Scrapes the *in-cluster* executor Service on /metrics. This is the signal KEDA
# scales the executor pool on (`kanbrick_mesh_pressure_ratio`, #63); the scrape
# stays on the internal network — the executor has no public ingress
# (networkpolicy.yaml). NEVER expose /metrics through a public ingress
# (docs/SECURITY.md).
#
# Requires the Prometheus Operator CRDs (monitoring.coreos.com). Being a CRD, this
# cannot be validated by `kubectl apply --dry-run=client`; validate it with
# kubeconform (schema-aware, CRDs skipped) or `--dry-run=server` against a cluster
# that has the operator installed.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kanbrick-executor
  labels:
    app.kubernetes.io/name: kanbrick-executor
    app.kubernetes.io/part-of: kanbrick
    # Must match your Prometheus's `serviceMonitorSelector` (kube-prometheus-stack
    # defaults to `release: <helm-release>`). Adjust to your install.
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kanbrick-executor
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
