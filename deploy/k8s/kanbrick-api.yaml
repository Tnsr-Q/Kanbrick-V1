# Kanbrick-V1 control plane — single-pod, single-writer tier (#65/#71).
#
# Bundles the PersistentVolumeClaim, Deployment, and Service. The Prometheus
# ServiceMonitor and the KEDA ScaledObject are CRDs, so they live in separate
# files (servicemonitor.yaml, keda-scaledobject.yaml) — this file is pure core API
# resources and validates with `kubectl apply --dry-run=client`.
#
# ⚠️ SINGLE REPLICA ONLY. The embedded SparrowDB graph and the content-addressed
# asset volume are single-writer; the control plane owns them and every write. WASM
# execution is offloaded to the stateless executor pool (kanbrick-executor.yaml),
# which is what scales — the control plane does NOT. Do not raise `replicas` here
# (see scale-out.md).
#
# Prerequisites:
#   * A built image (see ../../Dockerfile and scripts/docker-release.sh).
#   * A Secret `kanbrick-secrets` with keys `jwt-secret` and `internal-token`
#     (the latter is the shared transport secret for the internal RPC surface and
#     the executor pool, #69/#70):
#       kubectl create secret generic kanbrick-secrets \
#         --from-literal=jwt-secret="$(openssl rand -hex 32)" \
#         --from-literal=internal-token="$(openssl rand -hex 32)"
#   * One-time seed (the image bundles the seed data + CLI):
#       kubectl exec deploy/kanbrick-api -- kanbrick-cli seed \
#         --file /opt/kanbrick/seed/kanbrick_seed_data.cypher \
#         --db /var/lib/kanbrick/firm.db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kanbrick-data
  labels:
    app.kubernetes.io/name: kanbrick-api
spec:
  # ReadWriteOnce matches the single-writer model: the graph DB (firm.db) and the
  # asset registry (assets/) both live on this one volume, owned by one pod.
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanbrick-api
  labels:
    app.kubernetes.io/name: kanbrick-api
spec:
  replicas: 1 # do not raise — single-writer control plane (see scale-out.md)
  strategy:
    # The RWO volume cannot be attached to two pods at once, so never run old and
    # new pods simultaneously during a rollout.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kanbrick-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanbrick-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001 # matches the `kanbrick` user pinned in the Dockerfile
        runAsGroup: 10001
        fsGroup: 10001 # chowns the PVC so the non-root user can write to it
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kanbrick-api
          # Replace with your published image (built via ../../Dockerfile).
          image: ghcr.io/tnsr-q/kanbrick-v1:latest
          args:
            - "--port=8080"
            - "--db=/var/lib/kanbrick/firm.db"
            - "--asset-dir=/var/lib/kanbrick/assets"
            - "--internal-port=8090"
          ports:
            - name: http
              containerPort: 8080
            # Internal RPC surface (#69/#70): served only when KANBRICK_INTERNAL_TOKEN
            # is set; confined to executor pods by networkpolicy.yaml. Never public.
            - name: internal
              containerPort: 8090
          env:
            - name: KANBRICK_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kanbrick-secrets
                  key: jwt-secret
            # Shared transport secret for the internal RPC surface and the executor
            # pool (#69/#70). Setting it enables the internal listener on 8090.
            - name: KANBRICK_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kanbrick-secrets
                  key: internal-token
            # Forward guest invocations to the executor pool (#70). Unset ⇒ run
            # guests in-process (the prior single-pod behaviour).
            - name: KANBRICK_EXECUTOR_URL
              value: "http://kanbrick-executor:8080"
            - name: RUST_LOG
              value: "info"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true # only the PVC mount and /tmp are writable
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kanbrick
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kanbrick-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kanbrick-api
  labels:
    app.kubernetes.io/name: kanbrick-api
spec:
  # ClusterIP: in-cluster only. `/metrics` (on 8080) is unauthenticated and
  # exposes the guest catalogue (see docs/SECURITY.md); the internal RPC surface
  # (8090) is the capability-authorized executor callback path — networkpolicy.yaml
  # confines it to executor pods. Never route either through a public ingress;
  # expose only the application paths on 8080 externally, if any.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kanbrick-api
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: internal
      port: 8090
      targetPort: internal
